  <meta charset="utf-8">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <strong class="brand">Elann Design<span class="dot">.</span></strong>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="work.html">Work</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</header>

<section class="section">
  <div class="container">
    <h1>Contact</h1>
    <p class="lead">Tell us what you need. We reply within 24 hours.</p>

    <form class="card" action="https://formspree.io/f/mnjbrbwy" method="POST">
      <label>Your name</label>
      <input name="name" placeholder="Your name" required>

      <div style="height:10px"></div>

      <label>Business name (optional)</label>
      <input name="business" placeholder="Business name">

      <div style="height:10px"></div>

      <label>Email</label>
      <input type="email" name="email" placeholder="Email" required>

      <div style="height:10px"></div>

      <label>What do you need?</label>
      <textarea name="message" rows="6" placeholder="Tell us what you need" required></textarea>

      <div style="height:14px"></div>
      <button class="btn" type="submit">Send</button>

      <p class="micro">By submitting this form, you agree to be contacted by email.</p>
    </form>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <p>© Elann Design . <a href="legal.html">Legal</a></p>
  </div>
</footer>

</body>
</html>
